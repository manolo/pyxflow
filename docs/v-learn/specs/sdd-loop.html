<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0d1117,#161b22 50%,#0d1117);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.sdd-text,.pyxflow-text{transition:opacity 0.5s ease}
.step{transition:transform 0.5s ease}
.step.active{transform:scale(1.6)}
.btn{position:fixed;bottom:24px;right:24px;background:rgba(22,118,243,0.15);border:1px solid rgba(22,118,243,0.3);color:#8899aa;font-family:system-ui,-apple-system,sans-serif;font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all 0.2s;z-index:10}
.btn:hover{background:rgba(22,118,243,0.25);color:#e6edf3}
.icon-btn{position:fixed;bottom:24px;width:38px;height:38px;border-radius:50%;border:1px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;z-index:10;padding:0;background:transparent}
.icon-btn svg{width:18px;height:18px}
.icon-btn.sdd{left:24px;border-color:rgba(22,118,243,0.3);color:#1676f3}
.icon-btn.sdd:hover{background:rgba(22,118,243,0.15);border-color:rgba(22,118,243,0.6)}
.icon-btn.pyf{left:72px;border-color:rgba(16,185,129,0.3);color:#10b981}
.icon-btn.pyf:hover{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.6)}
.mode-label{transition:opacity 0.6s ease,transform 0.6s ease}
.mode-label.hidden{opacity:0}
.mode-label.slide-up{transform:translateY(-12px)}
.mode-label.slide-down{transform:translateY(12px)}
</style>
</head>
<body>

<svg id="svg" viewBox="0 0 620 460" style="height:calc(100vh - 50px);max-width:95%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1676f3"/>
    </marker>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Animated sweeping gradient for SDD label -->
    <linearGradient id="grad-blue" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d3b7a"/>
      <stop offset="40%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="60%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#0d3b7a"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-50,0;450,0;-50,0" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- Animated sweeping gradient for PyXFlow label -->
    <linearGradient id="grad-green" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="40%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#a7f3d0"/>
      <stop offset="60%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#064e3b"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-50,0;450,0;-50,0" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Guide circle -->
  <circle cx="310" cy="245" r="185" fill="none" stroke="rgba(22,118,243,0.06)" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Arrow arcs -->
  <g stroke="#1676f3" stroke-width="2" fill="none" marker-end="url(#ah)" filter="url(#gl)" opacity="0.55">
    <path d="M400,83 A 185 185 0 0 1 467,147"/>
    <path d="M495,231 A 185 185 0 0 1 459,355"/>
    <path d="M340,428 A 185 185 0 0 1 280,428"/>
    <path d="M161,355 A 185 185 0 0 1 126,231"/>
    <path d="M153,147 A 185 185 0 0 1 221,82"/>
  </g>

  <!-- Center mode labels (crossfade) -->
  <text id="mode-sdd" class="mode-label" x="310" y="252" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800"
        letter-spacing="0.5" fill="url(#grad-blue)">Spec-Driven Development</text>
  <text id="mode-pyxflow" class="mode-label hidden slide-down" x="310" y="252" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800"
        letter-spacing="0.5" fill="url(#grad-green)">Python Flow Implementation</text>

  <!-- Step 1: top — center (310, 60) -->
  <g class="step" style="transform-origin:310px 60px">
    <rect x="233" y="30" width="155" height="60" rx="10" fill="#0f1923" stroke="rgba(22,118,243,0.30)" stroke-width="1.5" style="transition:stroke 0.4s,fill 0.4s"/>
    <g class="sdd-text">
      <text x="310" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#1676f3" font-size="12" font-weight="700">1. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Define</tspan></text>
      <text x="310" y="76" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">Specs define WHAT</text>
    </g>
    <g class="pyxflow-text" style="opacity:0">
      <text x="310" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#10b981" font-size="12" font-weight="700">1. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Write spec</tspan></text>
      <text x="310" y="76" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">from Java source</text>
    </g>
  </g>

  <!-- Step 2: upper-right — center (486, 188) -->
  <g class="step" style="transform-origin:486px 188px">
    <rect x="409" y="158" width="155" height="60" rx="10" fill="#0f1923" stroke="rgba(22,118,243,0.30)" stroke-width="1.5" style="transition:stroke 0.4s,fill 0.4s"/>
    <g class="sdd-text">
      <text x="486" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#1676f3" font-size="12" font-weight="700">2. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Generate</tspan></text>
      <text x="486" y="204" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">Agents define HOW</text>
    </g>
    <g class="pyxflow-text" style="opacity:0">
      <text x="486" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#10b981" font-size="12" font-weight="700">2. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Generate code</tspan></text>
      <text x="486" y="204" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">AI agent from spec</text>
    </g>
  </g>

  <!-- Step 3: lower-right — center (419, 395) -->
  <g class="step" style="transform-origin:419px 395px">
    <rect x="342" y="365" width="155" height="60" rx="10" fill="#0f1923" stroke="rgba(22,118,243,0.30)" stroke-width="1.5" style="transition:stroke 0.4s,fill 0.4s"/>
    <g class="sdd-text">
      <text x="419" y="391" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#1676f3" font-size="12" font-weight="700">3. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Validate</tspan></text>
      <text x="419" y="411" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">Tests + human review</text>
    </g>
    <g class="pyxflow-text" style="opacity:0">
      <text x="419" y="391" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#10b981" font-size="12" font-weight="700">3. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Run tests</tspan></text>
      <text x="419" y="411" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">2,457 unit · 446 UI</text>
    </g>
  </g>

  <!-- Step 4: lower-left — center (201, 395) -->
  <g class="step" style="transform-origin:201px 395px">
    <rect x="124" y="365" width="155" height="60" rx="10" fill="#0f1923" stroke="rgba(22,118,243,0.30)" stroke-width="1.5" style="transition:stroke 0.4s,fill 0.4s"/>
    <g class="sdd-text">
      <text x="201" y="391" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#1676f3" font-size="12" font-weight="700">4. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Discover</tspan></text>
      <text x="201" y="411" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">Drift, edge cases</text>
    </g>
    <g class="pyxflow-text" style="opacity:0">
      <text x="201" y="391" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#10b981" font-size="12" font-weight="700">4. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Find pitfall</tspan></text>
      <text x="201" y="411" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">45 documented</text>
    </g>
  </g>

  <!-- Step 5: upper-left — center (134, 188) -->
  <g class="step" style="transform-origin:134px 188px">
    <rect x="57" y="158" width="155" height="60" rx="10" fill="#0f1923" stroke="rgba(22,118,243,0.30)" stroke-width="1.5" style="transition:stroke 0.4s,fill 0.4s"/>
    <g class="sdd-text">
      <text x="134" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#1676f3" font-size="12" font-weight="700">5. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Refine</tspan></text>
      <text x="134" y="204" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">Update specs, iterate</text>
    </g>
    <g class="pyxflow-text" style="opacity:0">
      <text x="134" y="184" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"><tspan fill="#10b981" font-size="12" font-weight="700">5. </tspan><tspan fill="#e6edf3" font-size="14" font-weight="600">Update spec</tspan></text>
      <text x="134" y="204" text-anchor="middle" fill="#8899aa" font-family="system-ui,-apple-system,sans-serif" font-size="11">prevent recurrence</text>
    </g>
  </g>
</svg>

<!-- SDD: document/spec icon -->
<button class="icon-btn sdd" onclick="jumpSdd()" title="Spec-Driven Development">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>
  </svg>
</button>
<!-- PyXFlow: Python snake icon -->
<button class="icon-btn pyf" onclick="jumpPyflow()" title="Python Flow Implementation">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2C8 2 8 4 8 5v3h5v1H6c-2 0-3 1.5-3 4s1 4 3 4h2v-3c0-2 1-3 3-3h4c2 0 3-1 3-3V5c0-2-2-3-6-3z"/><path d="M12 22c4 0 4-2 4-3v-3h-5v-1h7c2 0 3-1.5 3-4s-1-4-3-4h-2v3c0 2-1 3-3 3h-4c-2 0-3 1-3 3v4c0 2 2 3 6 3z"/><circle cx="10" cy="5" r="0.8" fill="currentColor"/><circle cx="14" cy="19" r="0.8" fill="currentColor"/>
  </svg>
</button>
<button class="icon-btn" style="right:24px;left:auto;border-color:rgba(255,255,255,0.2);color:#8899aa" onclick="advance()" title="Next step">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21.5 2v6h-6"/><path d="M21.5 8A10 10 0 1 0 18.3 19.7"/>
  </svg>
</button>

<script>
const steps = document.querySelectorAll('.step');
const sdd = document.querySelectorAll('.sdd-text');
const pyxflow = document.querySelectorAll('.pyxflow-text');
const modeSdd = document.getElementById('mode-sdd');
const modePyflow = document.getElementById('mode-pyxflow');
const svg = document.getElementById('svg');

// Color schemes
const BLUE = { stroke: 'rgba(22,118,243,0.30)', strokeHi: 'rgba(22,118,243,0.7)', fill: '#0f1923', fillHi: '#132438' };
const GREEN = { stroke: 'rgba(16,185,129,0.35)', strokeHi: 'rgba(16,185,129,0.75)', fill: '#0f1f1b', fillHi: '#13302a' };

const switched = [false, false, false, false, false];
let pos = -1;

function activate(idx) {
  steps.forEach(s => s.classList.remove('active'));
  steps.forEach((s, i) => {
    const rect = s.querySelector('rect');
    const scheme = switched[i] ? GREEN : BLUE;
    if (i === idx) {
      svg.appendChild(s);
      void s.getBoundingClientRect();
      s.classList.add('active');
      rect.setAttribute('stroke', scheme.strokeHi);
      rect.setAttribute('fill', scheme.fillHi);
    } else {
      rect.setAttribute('stroke', scheme.stroke);
      rect.setAttribute('fill', scheme.fill);
    }
  });
}

function advance() {
  pos++;
  if (pos < 5) {
    activate(pos);
  } else if (pos < 10) {
    const i = pos - 5;
    switched[i] = true;
    sdd[i].style.opacity = '0';
    pyxflow[i].style.opacity = '1';
    if (i === 0) {
      modeSdd.classList.add('hidden', 'slide-up');
      modePyflow.classList.remove('hidden', 'slide-down');
    }
    activate(i);
  } else if (pos === 10) {
    modePyflow.classList.add('hidden', 'slide-down');
    modeSdd.classList.remove('hidden', 'slide-up');
    activate(-1);
  } else {
    pos = -1;
    for (let i = 0; i < 5; i++) {
      switched[i] = false;
      sdd[i].style.opacity = '1';
      pyxflow[i].style.opacity = '0';
    }
    activate(-1);
  }
}

function jumpSdd() {
  pos = -1;
  for (let i = 0; i < 5; i++) {
    switched[i] = false;
    sdd[i].style.opacity = '1';
    pyxflow[i].style.opacity = '0';
  }
  modePyflow.classList.add('hidden', 'slide-down');
  modeSdd.classList.remove('hidden', 'slide-up');
  activate(-1);
}

function jumpPyflow() {
  pos = 10;
  for (let i = 0; i < 5; i++) {
    switched[i] = true;
    sdd[i].style.opacity = '0';
    pyxflow[i].style.opacity = '1';
  }
  modeSdd.classList.add('hidden', 'slide-up');
  modePyflow.classList.remove('hidden', 'slide-down');
  activate(-1);
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); advance(); }
});
</script>
</body>
</html>
