<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vaadin Platform 25 — Architecture Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
#app{max-width:1100px;margin:0 auto;padding:1.5rem;transition:max-width .3s,padding .3s;overflow-x:hidden}
#app.split-mode{max-width:100%;padding:1.5rem 2rem}

/* Header (removed — titles hidden for embed use) */
/* Mode buttons — fixed bottom-left */
.mode-btns{
  position:fixed;bottom:.8rem;right:.8rem;z-index:900;
  display:flex;gap:.35rem;
}
.ess-btn,.mvp-btn{
  background:rgba(15,23,42,.85);border:1px solid rgba(255,255,255,.12);
  color:#94a3b8;border-radius:6px;padding:.3rem .55rem;cursor:pointer;
  font-size:.65rem;font-weight:600;transition:all .25s;display:flex;align-items:center;gap:.25rem;
  backdrop-filter:blur(8px);
}
.ess-btn:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.3)}
.ess-btn.active{background:rgba(250,204,21,.12);border-color:rgba(250,204,21,.4);color:#facc15}
.ess-btn .ess-icon{font-size:.8rem}
.mvp-btn:hover{background:rgba(96,165,250,.15);color:#60a5fa;border-color:rgba(96,165,250,.4)}
.mvp-btn.active{background:rgba(96,165,250,.15);border-color:rgba(96,165,250,.5);color:#60a5fa}
.mvp-btn .mvp-icon{font-size:.8rem}
.py-btn{
  background:rgba(15,23,42,.85);border:1px solid rgba(255,255,255,.12);
  color:#94a3b8;border-radius:6px;padding:.3rem .55rem;cursor:pointer;
  font-size:.65rem;font-weight:600;transition:all .25s;display:flex;align-items:center;gap:.25rem;
  backdrop-filter:blur(8px);
}
.py-btn:hover{background:rgba(74,222,128,.15);color:#4ade80;border-color:rgba(74,222,128,.4)}
.py-btn.active{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.5);color:#4ade80}
.py-btn .py-icon{font-size:.8rem}

/* MVP mode — side by side Browser | pipe | Server */
.mvp-layout{display:flex;align-items:center;gap:0;margin-top:.5rem}
.mvp-box{
  flex:1;min-width:0;border-radius:16px;padding:1.2rem 1.2rem 1.4rem;
  position:relative;overflow:visible;
  box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
}
.mvp-box-title{
  display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;
  font-size:1.05rem;font-weight:700;color:#fff;
}
.mvp-box-title .mvp-icon{font-size:1.3rem}
.mvp-box-title .mvp-sub{opacity:.45;font-size:.68rem;font-weight:500;margin-left:auto;letter-spacing:1px;text-transform:uppercase}
.mvp-items{display:flex;flex-direction:column;gap:.35rem}
.mvp-item{
  padding:.55rem .65rem;border-radius:8px;cursor:pointer;
  transition:transform .15s,filter .15s;
  box-shadow:0 2px 6px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.05);
  font-size:.82rem;font-weight:600;color:#e2e8f0;text-align:center;
}
.mvp-item:hover{transform:translateY(-1px);filter:brightness(1.2)}
/* Horizontal animated cable between boxes */
.mvp-pipe{
  flex:0 0 100px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:visible;align-self:center;gap:.5rem;
}
.mvp-pipe-line{
  height:4px;position:relative;width:100%;
  background:linear-gradient(90deg,#2563eb,#3b82f6 15%,#60a5fa 35%,#93c5fd 50%,#60a5fa 65%,#3b82f6 85%,#2563eb);
  border-radius:4px;overflow:hidden;
  box-shadow:0 0 30px rgba(59,130,246,.9),0 0 60px rgba(59,130,246,.5),0 0 10px rgba(147,197,253,1),0 0 90px rgba(59,130,246,.25);
}
.mvp-pipe-line::before,.mvp-pipe-line::after{
  content:'';position:absolute;top:-5px;height:18px;width:50px;border-radius:9px;
}
.mvp-pipe-line::before{
  background:linear-gradient(90deg,rgba(219,234,254,.9),transparent);
  animation:pipeRight 1.6s ease-in-out infinite;
}
.mvp-pipe-line::after{
  background:linear-gradient(270deg,rgba(219,234,254,.9),transparent);
  animation:pipeLeft 1.6s ease-in-out infinite .5s;
}
@keyframes pipeRight{0%{left:-50px}100%{left:100%}}
@keyframes pipeLeft{0%{right:-50px}100%{right:100%}}
.mvp-pipe-label{
  position:relative;z-index:2;
  font-size:.72rem;font-weight:800;color:#bfdbfe;letter-spacing:3px;white-space:nowrap;
  text-shadow:0 0 20px rgba(59,130,246,.8);
  background:rgba(15,23,42,.95);padding:.35rem .8rem;border-radius:5px;
  border:1.5px solid rgba(59,130,246,.5);
  box-shadow:0 0 16px rgba(59,130,246,.4);
}

/* Essentials — transitions only, no re-render */
.col-child{transition:padding .35s,font-size .35s,opacity .35s,filter .35s,box-shadow .35s,color .35s,font-weight .0s}
.col-header{transition:opacity .35s}
.block{transition:padding .35s,min-height .35s,opacity .35s,filter .35s,box-shadow .35s,transform .35s}
.block .bdesc,.block .bmeta,.block .bicon{transition:opacity .3s,max-height .35s;max-height:6rem;overflow:hidden}
.ess-btn{transition:all .25s}
#app.ess-mode .col-child.is-ess{
  padding:.65rem .5rem;font-size:.82rem;font-weight:700;color:#fff;
  filter:brightness(1.3);box-shadow:inset 0 0 0 1.5px rgba(250,204,21,.45);
  order:-1;
}
#app.ess-mode .col-child:not(.is-ess){opacity:.45;padding:.3rem .4rem;font-size:.68rem;order:1}
#app.ess-mode .col-header.no-ess{opacity:.5}
#app.ess-mode .remaining .block{opacity:.5;filter:grayscale(.2)}

/* Breadcrumb */
.crumbs{display:flex;align-items:center;gap:.4rem;margin-bottom:1.2rem;min-height:2rem;flex-wrap:wrap}
.crumb{font-size:.8rem;color:#94a3b8;cursor:pointer;padding:.2rem .6rem;border-radius:4px;transition:all .2s}
.crumb:hover{color:#fff;background:rgba(255,255,255,.08)}
.crumb.current{color:#fff;font-weight:600;cursor:default;background:transparent}
.crumb.current:hover{background:transparent}
.sep{color:#475569;font-size:.7rem;user-select:none}

/* Grid of blocks (nothing selected) */
.grid{display:flex;flex-wrap:wrap;gap:.75rem}
.block{
  border-radius:10px;padding:1.3rem;cursor:pointer;
  flex:1 1 calc(33.33% - .75rem);min-width:240px;min-height:130px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;
  transition:transform .2s,filter .2s;
}
.block:hover{transform:translateY(-3px);filter:brightness(1.15)}
.block .bicon{font-size:1.6rem;margin-bottom:.5rem}
.block .bname{font-size:1.1rem;font-weight:700;margin-bottom:.3rem}
.block .bdesc{font-size:.78rem;opacity:.75;line-height:1.4}
.block .bmeta{font-size:.7rem;opacity:.5;margin-top:.5rem}
@keyframes blockIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.home-grid .block{animation:blockIn .35s ease both}

/* Pills row (siblings when one is selected) */
.pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.pill{
  font-size:.75rem;padding:.3rem .7rem;border-radius:6px;cursor:pointer;
  opacity:.55;transition:all .2s;white-space:nowrap;font-weight:500;
}
.pill:hover{opacity:.9;transform:scale(1.05)}
.pill.active{opacity:1;font-weight:700;box-shadow:0 0 0 2px rgba(255,255,255,.25)}
@keyframes pillsIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

/* Content area */
.content{}
@keyframes contentIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Detail card (leaf node) */
.detail{
  background:rgba(255,255,255,.04);border-radius:10px;padding:1.2rem 1.4rem;
  line-height:1.7;font-size:.88rem;animation:blockIn .35s ease both;
}
.detail h3{font-size:1rem;font-weight:700;margin-bottom:.6rem;color:#fff}
.detail ul{padding-left:1.3rem;margin:.4rem 0}
.detail li{margin-bottom:.25rem}
.detail .tag{
  display:inline-block;padding:.12rem .45rem;border-radius:4px;
  font-size:.7rem;font-weight:600;margin-right:.3rem;vertical-align:middle;
}
.tag.open{background:#065f46;color:#6ee7b7}
.tag.com{background:#7f1d1d;color:#fca5a5}
.tag.dep{background:#374151;color:#9ca3af;text-decoration:line-through}
.detail .stat{font-size:.75rem;color:#64748b;margin-top:.5rem}
.detail a{color:#60a5fa;text-decoration:none}
.detail a:hover{text-decoration:underline}
.detail code{background:rgba(255,255,255,.08);padding:.1rem .35rem;border-radius:3px;font-size:.82rem}

/* Colors */
.c-fe{background:linear-gradient(135deg,#1e3a5f,#1e4f8a)}
.c-fl{background:linear-gradient(135deg,#134e4a,#0d7363)}
.c-hi{background:linear-gradient(135deg,#3b1c6e,#5b2d9e)}
.c-in{background:linear-gradient(135deg,#78350f,#a16207)}
.c-ki{background:linear-gradient(135deg,#7f1d1d,#b91c1c)}
.c-to{background:linear-gradient(135deg,#3f3f00,#6b6b1a)}
.c-le{background:linear-gradient(135deg,#1e293b,#334155)}
/* Child colors (lighter/subtler) */
.c-fe2{background:rgba(30,79,138,.45)}
.c-fl2{background:rgba(13,115,99,.4)}
.c-hi2{background:rgba(91,45,158,.4)}
.c-in2{background:rgba(161,98,7,.35)}
.c-ki2{background:rgba(185,28,28,.35)}
.c-to2{background:rgba(107,107,26,.4)}
.c-le2{background:rgba(51,65,85,.5)}

/* Split layout: open columns (left) + remaining big blocks (right) */
.split{display:flex;gap:.8rem;align-items:flex-start}
.open-cols{display:flex;gap:.6rem;min-width:0}
.open-col{flex:1;min-width:0;max-width:280px;display:flex;flex-direction:column;align-items:center}
.col-header{
  padding:.6rem .5rem;border-radius:8px;color:#fff;cursor:pointer;
  transition:filter .2s;text-align:center;width:100%;
  font-size:.82rem;font-weight:700;line-height:1.3;
}
.col-header:hover{filter:brightness(1.2)}
.col-header .ch-icon{font-size:1rem;display:block;margin-bottom:.15rem}
.col-down{color:#475569;font-size:.35rem;line-height:1;padding:.15rem 0;text-align:center;letter-spacing:1px;opacity:.6}
.col-children{display:flex;flex-direction:column;gap:.2rem;align-items:center;width:100%}
.col-child{
  font-size:.82rem;padding:.275rem .3rem;border-radius:6px;
  color:#cbd5e1;text-align:center;line-height:1.3;width:100%;
  cursor:pointer;font-weight:500;
}
.col-child:hover{filter:brightness(1.3)}
.col-child.selected{color:#fff;font-weight:600;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.3)}
.remaining{min-width:0;overflow:hidden}
.remaining .grid{gap:.5rem;display:flex;flex-wrap:wrap}
.remaining .block{min-width:120px;max-width:200px;min-height:0;flex:1 1 150px;word-break:break-word;padding:.8rem}
.remaining .block .bname{font-size:.9rem}
.remaining .block .bicon{font-size:1.2rem;margin-bottom:.3rem}
/* Detail dialog overlay */
.detail-overlay{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
}
.detail-dialog{
  background:#1e293b;border:1px solid rgba(255,255,255,.12);border-radius:14px;
  max-width:700px;width:90%;max-height:80vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
.detail-dialog-header{
  padding:.8rem 1rem;border-radius:14px 14px 0 0;display:flex;align-items:center;gap:.5rem;
  position:sticky;top:0;z-index:1;
}
.detail-dialog-header .sh-name{font-size:1rem;font-weight:700;color:#fff;flex:1}
.detail-dialog-header .license-badge{font-size:.65rem;font-weight:600;padding:.15rem .45rem;border-radius:4px;white-space:nowrap}
.license-badge.open{background:#065f46;color:#6ee7b7}
.license-badge.com{background:#7f1d1d;color:#fca5a5}
.detail-dialog-body{padding:.6rem 1.2rem 1.2rem}
.detail-dialog-body .detail{animation:none}
.detail-close{
  background:none;border:none;color:#94a3b8;font-size:1.2rem;cursor:pointer;
  padding:.2rem .4rem;border-radius:6px;transition:all .15s;line-height:1;
}
.detail-close:hover{color:#fff;background:rgba(255,255,255,.1)}
/* Flat child list inside dialog */
.dialog-children{display:flex;flex-direction:column;gap:.4rem}
.dialog-child{
  padding:.7rem .85rem;border-radius:7px;cursor:default;
  display:flex;flex-direction:column;gap:.2rem;
}
.dialog-child .dc-name{font-size:.95rem;font-weight:700;color:#fff}
.dialog-child .dc-desc{font-size:.78rem;color:#94a3b8;line-height:1.4}
.dialog-child .dc-meta{font-size:.68rem;opacity:.5}
.dialog-child .dc-license{font-size:.6rem;font-weight:600;padding:.1rem .35rem;border-radius:3px;align-self:flex-end;margin-top:.1rem}
.section-header{padding:.5rem .7rem;border-radius:8px;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.sh-name{font-size:.95rem;font-weight:700;color:#fff}
.sh-desc{font-size:.72rem;opacity:.55;margin-left:auto}

/* View Transitions */
::view-transition-old(*){animation-duration:.25s}
::view-transition-new(*){animation-duration:.25s}
/* Dialog animations */
@keyframes dialogIn{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes dialogOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(40px) scale(.97)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes overlayOut{from{opacity:1}to{opacity:0}}
.detail-overlay{animation:overlayIn .2s ease both}
.detail-overlay.closing{animation:overlayOut .2s ease both}
.detail-dialog{animation:dialogIn .3s cubic-bezier(.22,1,.36,1) both}
.detail-overlay.closing .detail-dialog{animation:dialogOut .2s ease both}

/* Responsive */
@media(max-width:700px){
  .block{flex:1 1 100%;min-width:0;min-height:100px}
  #app{padding:1rem}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════
// DATA — Vaadin Platform 25 Architecture
// ═══════════════════════════════════════════════════════════════════

const DATA = [
  // ── FRONTEND ──
  { name:"Frontend", icon:"🌐", c:"fe", desc:"Browser: Web Components + FlowClient.js + Themes + DevTools",
    meta:"56 npm packages",
    children:[
      { name:"Web Components Core", c:"fe", desc:"49 open-source Lit-based components",
        meta:"Apache 2.0 · @vaadin/* · Shadow DOM",
        children:[
          { name:"Inputs (16)", c:"fe",
            detail:'<h3>Input Components</h3><span class="tag open">Apache 2.0</span><ul><li><code>TextField</code>, <code>TextArea</code>, <code>PasswordField</code>, <code>EmailField</code>, <code>NumberField</code>, <code>IntegerField</code></li><li><code>DatePicker</code>, <code>TimePicker</code>, <code>DateTimePicker</code></li><li><code>ComboBox</code>, <code>MultiSelectComboBox</code>, <code>Select</code></li><li><code>RadioButtonGroup</code>, <code>CheckboxGroup</code>, <code>Checkbox</code></li><li><code>Upload</code>, <code>CustomField</code></li></ul><p class="stat">Each is a custom element with Shadow DOM, ARIA accessibility, client-side validation, and theming via CSS custom properties.</p>' },
          { name:"Data (4)", c:"fe",
            detail:'<h3>Data Components</h3><span class="tag open">Apache 2.0</span><ul><li><code>Grid</code> — Data table with virtual scroll, sorting, filtering, selection, column reordering, frozen columns, tree mode, detail rows. The most complex component (~3000 LOC JS).</li><li><code>VirtualList</code> — Virtual-scroll list for large datasets</li><li><code>ListBox</code> — Simple selection list (single/multi)</li><li><code>Markdown</code> — Renders Markdown to HTML</li></ul>' },
          { name:"Navigation (5)", c:"fe",
            detail:'<h3>Navigation Components</h3><span class="tag open">Apache 2.0</span><ul><li><code>AppLayout</code> — Main layout: navbar + drawer + content area</li><li><code>SideNav</code> — Collapsible side navigation menu</li><li><code>Tabs</code> + <code>TabSheet</code> — Tab panels with associated content</li><li><code>MenuBar</code> — Menu bar with dropdown sub-menus</li></ul>' },
          { name:"Layout (10)", c:"fe",
            detail:'<h3>Layout Components</h3><span class="tag open">Apache 2.0</span><ul><li><code>VerticalLayout</code>, <code>HorizontalLayout</code> — Flexbox layouts</li><li><code>FormLayout</code> — Responsive grid for forms</li><li><code>SplitLayout</code> — Split panel with draggable splitter</li><li><code>Scroller</code> — Scrollable container</li><li><code>FlexLayout</code> — Generic flexbox</li><li><code>Card</code> — Visual container with border and padding</li><li><code>Details</code>, <code>Accordion</code> — Collapsible sections</li><li><code>MasterDetailLayout</code> — Responsive list + detail</li></ul>' },
          { name:"Feedback (6)", c:"fe",
            detail:'<h3>Feedback Components</h3><span class="tag open">Apache 2.0</span><ul><li><code>Dialog</code> — Modal with header, content, footer</li><li><code>ConfirmDialog</code> — Dialog with Confirm/Cancel/Reject buttons</li><li><code>Notification</code> — Toast messages with configurable position</li><li><code>ProgressBar</code> — Progress bar (determinate/indeterminate)</li><li><code>Tooltip</code> — Floating tooltip with configurable trigger</li><li><code>Popover</code> — Popup anchored to a target element</li></ul>' },
          { name:"Display (6)", c:"fe",
            detail:'<h3>Display Components</h3><span class="tag open">Apache 2.0</span><ul><li><code>Avatar</code>, <code>AvatarGroup</code> — User photo/initials</li><li><code>Icon</code> — Lumo/Vaadin icon sets</li><li><code>MessageList</code>, <code>MessageInput</code> — Chat/messaging UI</li><li><code>Login</code> — Complete login form</li></ul>' },
          { name:"Internal (8)", c:"fe",
            detail:'<h3>Internal / Base Packages</h3><span class="tag open">Apache 2.0</span><ul><li><code>a11y-base</code> — Shared accessibility mixins</li><li><code>component-base</code> — Base class, direction, slots</li><li><code>field-base</code> — Base for input fields (label, error, helper)</li><li><code>field-highlighter</code> — Highlighting for Collaboration Engine</li><li><code>input-container</code> — Visual container for inputs</li><li><code>item</code> — Base for list/menu items</li><li><code>lit-renderer</code> — Renderer protocol for Grid, ComboBox, etc.</li><li><code>overlay</code> — Base for dialogs, dropdowns, popups</li></ul>' },
        ]
      },
      { name:"Web Components Pro", c:"fe", desc:"7 commercial components",
        meta:"Require Vaadin subscription",
        children:[
          { name:"Board", c:"fe", detail:'<h3>Board</h3><span class="tag com">Commercial</span><p>Responsive dashboard layout. Organizes content in rows that automatically reflow based on viewport (4 cols → 2 cols → 1 col). For dashboards and admin views.</p>' },
          { name:"Charts", c:"fe", detail:'<h3>Charts</h3><span class="tag com">Commercial</span><p>Interactive charts: line, bar, pie, area, scatter, gauge, waterfall, OHLC, heatmap, treemap, and more. SVG vector graphics, animations, tooltips, zoom, export. Based on Highcharts.</p>' },
          { name:"CRUD", c:"fe", detail:'<h3>CRUD</h3><span class="tag com">Commercial</span><p>High-level component combining Grid (listing) + Form (editor) for create/read/update/delete operations. Editor shown as overlay or side panel. Responsive.</p>' },
          { name:"Dashboard", c:"fe", detail:'<h3>Dashboard</h3><span class="tag com">Commercial</span><p>End-user configurable layout. Widgets with drag-and-drop, resize, auto-arrange in columns. Edit mode for reorganization. Layout persistable to database.</p>' },
          { name:"Grid Pro", c:"fe", detail:'<h3>Grid Pro</h3><span class="tag com">Commercial</span><p>Grid extension with inline editing. Click cell → editable (text/checkbox/select). Full keyboard navigation. Changes committed on blur.</p>' },
          { name:"Map", c:"fe", detail:'<h3>Map</h3><span class="tag com">Commercial</span><p>Interactive geographic map based on OpenLayers. Supports OpenStreetMap, XYZ tiles, WMS, vectors, markers, polygons. Click events on map and features.</p>' },
          { name:"Rich Text Editor", c:"fe", detail:'<h3>Rich Text Editor</h3><span class="tag com">Commercial</span><p>WYSIWYG editor with toolbar: bold, italic, headings, lists, blockquotes, code, links, images. Values in HTML or Quill Delta. Compatible with Binder.</p>' },
        ]
      },
      { name:"FlowClient.js + Push + Connectors", c:"fe", desc:"FlowClient.js · VaadinPush.js · *Connector.js",
        detail:'<h3>FlowClient.js + VaadinPush.js + Connectors</h3><span class="tag open">Apache 2.0</span><p>Client-side runtime scripts:</p><ul><li><b>FlowClient.js</b> — UIDL interpreter (GWT-compiled ~200KB). Receives JSON, applies changes to the DOM, sends RPCs via HTTP POST. Constant pool, SyncId tracking, SPA navigation.</li><li><b>VaadinPush.js</b> — Atmosphere client for WebSocket push server→client. Handshake, heartbeat, automatic reconnect.</li><li><b>*Connector.js</b> — Per-component scripts: <code>gridConnector.js</code>, <code>comboBoxConnector.js</code>, <code>contextMenuConnector.js</code>, <code>menubarConnector.js</code>, etc. Bridge between Lit components and the UIDL protocol.</li></ul><p class="stat">Reused identically by PyFlow.</p>' },
      { name:"React Wrappers", c:"fe", desc:"@vaadin/react-components",
        detail:'<h3>React Wrappers</h3><span class="tag open">Apache 2.0</span><p>React wrappers for all Vaadin web components. Two packages:</p><ul><li><code>@vaadin/react-components</code> — 49 core components</li><li><code>@vaadin/react-components-pro</code> — 7 commercial components</li></ul><p>Used by Hilla (React frontend). Flow uses the Lit web components directly, doesn\'t need these wrappers.</p>' },
      { name:"Lumo / Aura", c:"fe", desc:"2 themes with light + dark variants",
        detail:'<h3>Theme System</h3><span class="tag open">Apache 2.0</span><p>Two complete themes:</p><ul><li><b>Lumo</b> — Classic Vaadin theme. Dark via <code>&lt;html theme="dark"&gt;</code></li><li><b>Aura</b> — Modern theme. Dark via <code>color-scheme: dark</code></li></ul><p>CSS variables at 3 levels: <code>--vaadin-*</code> (base, both themes), <code>--lumo-*</code> (Lumo only), <code>--aura-*</code> (Aura only). Components import their own styles via Shadow DOM.</p>' },
      { name:"DevTools", c:"fe", desc:"In-browser dev overlay (was Copilot)",
        detail:'<h3>DevTools (was Copilot)</h3><span class="tag com">Commercial</span><p>In-browser panel that appears in development mode only. Renamed from Copilot to DevTools:</p><ul><li>Visually inspect and edit UI</li><li>AI prompts to modify views</li><li>Theme editor / design tokens</li><li>IDE synchronization (hotswap)</li><li>Accessibility and performance checks</li></ul><p class="stat">Loaded as an overlay on top of the app. Basic inspection is free.</p>' },

  // ── JAVA FRAMEWORK ──
  { name:"Framework", icon:"⚡", c:"fl", desc:"Server-side UI framework — the UIDL pipeline",
    meta:"2,104 classes · 242K LOC · flow/ repo",
    children:[
      { name:"Servlet Container", c:"fl", desc:"Tomcat / Jetty / Undertow",
        detail:'<h3>Servlet Container</h3><span class="tag open">External</span><p>The Jakarta EE application server. Receives HTTP, manages threads, TLS, WebSocket. Flow doesn\'t include its own — deployed as WAR or embedded (Spring Boot embeds Tomcat).</p><ul><li><b>Tomcat</b> — Default in Spring Boot</li><li><b>Jetty</b> — Default in bundle-generator (lightweight)</li><li><b>Undertow</b> — Red Hat alternative</li></ul>' },
      { name:"VaadinServlet + Service", c:"fl", desc:"Entry point + session management + handler dispatch",
        meta:"~331 classes",
        detail:'<h3>VaadinServlet + VaadinService</h3><span class="tag open">Apache 2.0</span><p><b>VaadinServlet</b> — Extends HttpServlet. First point of contact:</p><ul><li>Static file? → <code>StaticFileServer</code></li><li>Other? → Delegates to <code>VaadinService.handleRequest()</code></li></ul><p><b>VaadinService</b> — The main orchestrator:</p><ul><li>Find/create <code>VaadinSession</code> (wrapper over HttpSession)</li><li>Acquire session lock (<code>ReentrantLock</code>)</li><li>Dispatch to the Request Handlers chain</li></ul><p class="stat">VaadinSession contains N UI instances (1 per tab). Each UI has its own StateTree.</p>' },
      { name:"Request Handlers", c:"fl", desc:"Chain — first match wins",
        meta:"~50 classes",
        children:[
          { name:"UidlRequestHandler", c:"fl", detail:'<h3>UidlRequestHandler</h3><p><code>POST /?v-r=uidl</code> — Processes client RPCs. This is 95% of runtime traffic. Delegates to <code>ServerRpcHandler</code>.</p>' },
          { name:"BootstrapHandler", c:"fl", detail:'<h3>BootstrapHandler / IndexHtmlRequestHandler</h3><p><code>GET /</code> or <code>GET /about</code> — Generates <code>index.html</code> with bootstrap JS, theme CSS, appConfig, and initialUIDL. First load of each tab.</p>' },
          { name:"PushRequestHandler", c:"fl", detail:'<h3>PushRequestHandler</h3><p><code>GET /?v-r=push</code> — WebSocket handshake for server→client push. Uses Atmosphere framework. Format: <code>&lt;len&gt;|&lt;UUID&gt;|&lt;heartbeat&gt;|&lt;padding&gt;</code>.</p>' },
          { name:"StreamReceiverHandler", c:"fl", detail:'<h3>StreamReceiverHandler</h3><p><code>POST /VAADIN/dynamic/resource/...</code> — Receives file uploads. The Upload component registers a handler that receives name, MIME type, and bytes.</p>' },
          { name:"StreamRequestHandler", c:"fl", detail:'<h3>StreamRequestHandler</h3><p><code>GET /?v-r=dl</code> — Serves dynamic downloads (StreamResource). PDFs, exports, files generated on-the-fly.</p>' },
          { name:"HeartbeatHandler", c:"fl", detail:'<h3>HeartbeatHandler</h3><p><code>POST /?v-r=heartbeat</code> — Ping every 5 min to keep session alive. If server doesn\'t respond, client shows "Session expired".</p>' },
          { name:"PwaHandler + FaviconHandler", c:"fl", detail:'<h3>PwaHandler + FaviconHandler</h3><p><code>/sw.js</code> — Service worker for PWA offline.<br><code>/favicon.ico</code> — Application icon.<br>Both optional, configurable via <code>@PWA</code> annotation.</p>' },
        ]
      },
      { name:"ServerRpcHandler", c:"fl", desc:"Parse JSON → validate → dispatch by RPC type",
        meta:"~15 classes",
        children:[
          { name:"MapSyncRpcHandler", c:"fl", detail:'<h3>MapSyncRpcHandler (mSync)</h3><p>Synchronizes properties client → server. When the user types in a TextField, the client sends <code>{type:"mSync", node:5, feature:1, property:"value", value:"hello"}</code>. The handler updates the StateNode.</p><p class="stat">Processed BEFORE events (two-pass). Without this, a keydown shortcut would read the old value.</p>' },
          { name:"EventRpcHandler", c:"fl", detail:'<h3>EventRpcHandler (event)</h3><p>Dispatches DOM events: <code>click</code>, <code>change</code>, <code>opened-changed</code>, <code>keydown</code>, <code>ui-navigate</code>... Finds the StateNode by ID, looks up listeners in Feature 4, and fires them.</p>' },
          { name:"NavigationRpcHandler", c:"fl", detail:'<h3>NavigationRpcHandler (navigation)</h3><p><code>ui-navigate</code> event from FlowClient. Router resolves the route → instantiates the view → attaches to StateTree → detaches the previous view. Lifecycle: BeforeLeave → BeforeEnter → Constructor → AfterNavigation.</p>' },
          { name:"ClientCallableHandler", c:"fl", detail:'<h3>ClientCallableHandler (publishedEventHandler)</h3><p>Methods marked with <code>@ClientCallable</code>. The client calls <code>this.$server.methodName(arg)</code>, the server executes the method and optionally returns a Promise.</p>' },
          { name:"AttachExisting + ReturnChannel", c:"fl", detail:'<h3>AttachExistingElementHandler + ReturnChannelHandler</h3><p><b>AttachExisting</b> — Finds an existing element in the DOM and associates it with a StateNode (for Lit templates).</p><p><b>ReturnChannel</b> — Bidirectional channel for async JS→Java communication (callbacks registered server-side, invoked from client).</p>' },
        ]
      },
      { name:"StateTree + Features", c:"fl", desc:"Tree of numbered nodes — the heart of the system",
        meta:"103 classes · 39 Features · 11 Change types",
        children:[
          { name:"StateTree", c:"fl", detail:'<h3>StateTree</h3><p>The complete tree for a UI. Every visible component is a StateNode in this tree. Maintains:</p><ul><li>Node registry by ID</li><li>Pending changes (collected in each response)</li><li>ConstantPool (config deduplication by hash)</li><li>CurrentInstance (ThreadLocal for accessing the current UI)</li></ul>' },
          { name:"StateNode + NodeFeature", c:"fl", detail:'<h3>StateNode</h3><p>A node has Features (numbered maps). 39 NodeFeature classes in Java:</p><ul><li><b>F0</b> ElementData (tag, payload)</li><li><b>F1</b> ElementPropertyMap (value, label, disabled...)</li><li><b>F2</b> ElementChildrenList (splice add/remove)</li><li><b>F3</b> ElementAttributeMap (theme, id, class)</li><li><b>F4</b> ElementListenerMap (click, change, keydown...)</li><li><b>F7</b> TextNodeMap (text content)</li><li><b>F12</b> ElementStylePropertyMap (CSS inline)</li><li><b>F19</b> ClientDelegateHandlers (@ClientCallable)</li><li><b>F24</b> VirtualChildrenList (overlays, dialogs)</li><li>+ F5,F6,F8-F11,F13-F18,F20-F23,F25 (15 more)</li></ul>' },
          { name:"Change Types", c:"fl", detail:'<h3>11 Change Types</h3><p>Every tree modification generates a Change serialized in the UIDL response:</p><ul><li><code>attach</code> / <code>detach</code> — node enters/leaves tree</li><li><code>put</code> / <code>remove</code> — set/delete in a Feature map</li><li><code>splice</code> — add/remove children in a list</li><li><code>clear</code> — clear an entire list</li><li><code>MapPutChange</code>, <code>MapRemoveChange</code>, <code>ListAddChange</code>, <code>ListRemoveChange</code>, <code>ListClearChange</code>, <code>NodeAttachChange</code>, <code>NodeDetachChange</code></li></ul>' },
        ]
      },
      { name:"Element API", c:"fl", desc:"DOM abstraction over StateNode",
        meta:"37 classes",
        detail:'<h3>Element API</h3><span class="tag open">Apache 2.0</span><p>Abstraction layer to manipulate a StateNode as if it were a DOM element:</p><ul><li><code>.setProperty(name, value)</code> → put in Feature 1</li><li><code>.setAttribute(name, value)</code> → put in Feature 3</li><li><code>.appendChild(child)</code> → splice in Feature 2</li><li><code>.getStyle().set(name, value)</code> → put in Feature 12</li><li><code>.addEventListener(type, listener)</code> → put in Feature 4</li><li><code>.executeJs(script, args)</code> → queue execute command</li><li><code>.getClassList()</code> → manage class attribute</li></ul><p class="stat">37 classes in Java. The Element bridges Component (high-level) and StateNode (low-level).</p>' },
      { name:"Component Model", c:"fl", desc:"Component base + 30+ mixins + lifecycle",
        meta:"141 classes",
        detail:'<h3>Component Model</h3><span class="tag open">Apache 2.0</span><p>Base <code>Component</code> class + mixins for common features:</p><ul><li><code>HasValue&lt;T&gt;</code> — getValue/setValue for fields</li><li><code>HasComponents</code> — add/remove/removeAll</li><li><code>HasEnabled</code>, <code>HasSize</code>, <code>HasStyle</code></li><li><code>HasText</code>, <code>HasTheme</code>, <code>HasAriaLabel</code></li><li><code>ClickNotifier</code>, <code>FocusNotifier</code>, <code>BlurNotifier</code></li><li><code>AbstractField&lt;C,T&gt;</code>, <code>AbstractSinglePropertyField</code></li><li><code>Composite&lt;T&gt;</code>, <code>KeyNotifier</code></li></ul><p>Lifecycle: constructor → <code>onAttach()</code> → visible → <code>onDetach()</code>. The component wraps an Element and delegates operations.</p>' },
      { name:"Flow Components", c:"fl", desc:"Java wrappers for the 49 web components",
        meta:"977 classes · 209K LOC · 49 modules",
        detail:'<h3>Flow Components</h3><span class="tag open">Apache 2.0</span><p>Each web component has a Java module in <code>flow-components/</code> with:</p><ul><li>Main Java class (e.g. <code>Button</code>, <code>Grid&lt;T&gt;</code>)</li><li>Event classes (e.g. <code>ClickEvent</code>)</li><li>Sub-components (e.g. <code>Grid.Column&lt;T&gt;</code>)</li><li>JS Connectors (e.g. <code>gridConnector.js</code>)</li><li>Renderers (e.g. <code>ComponentRenderer&lt;C,T&gt;</code>)</li></ul><p>Most complex: <b>Grid</b> (virtual scroll, lazy loading, sorting, filtering, selection, column reorder, detail rows, tree mode, drag-and-drop, renderers).</p><p class="stat">977 classes in 49 vaadin-*-flow-parent modules. 209K LOC total.</p>' },
      { name:"Data Binding", c:"fl", desc:"Binder, DataProvider, Validators, Converters",
        meta:"155 classes · flow-data/",
        detail:'<h3>Data Binding (flow-data/)</h3><span class="tag open">Apache 2.0</span><ul><li><b>Binder&lt;T&gt;</b> — Binds fields to bean properties. <code>binder.forField(field).withConverter(...).withValidator(...).bind(getter, setter)</code></li><li><b>DataProvider&lt;T,F&gt;</b> — Lazy loading for Grid/ComboBox. <code>fromCallbacks(fetch, count)</code></li><li><b>DataCommunicator</b> — Manages the visible window (offset/limit), pushes data to client</li><li><b>Validators</b> — Email, Range, StringLength, Regexp, Bean (JSR-303)</li><li><b>Converters</b> — StringToInteger, StringToDouble, LocalDateToDate...</li><li><b>SelectionModel</b> — Single, Multi, None</li></ul><p class="stat">155 classes. Binder is the central pattern for typed forms.</p>' },
      { name:"Router", c:"fl", desc:"@Route, Navigation lifecycle, layouts",
        meta:"93 classes",
        detail:'<h3>Router</h3><span class="tag open">Apache 2.0</span><p>Server-side navigation machinery:</p><ul><li><code>RouteRegistry</code> — Maps URL → view class</li><li><code>RouteResolver</code> — Resolves Location → NavigationTarget</li><li><code>NavigationStateRenderer</code> — Instantiates view, attaches to UI</li><li><code>RouterLayout</code> — Interface for layouts (views inside layouts)</li></ul><p>Lifecycle events (in order):</p><ol><li><code>BeforeLeaveEvent</code> → old view (can cancel)</li><li><code>BeforeEnterEvent</code> → new view (can redirect)</li><li>New view constructor</li><li><code>AfterNavigationEvent</code> → both views</li></ol><p>Supports: <code>HasUrlParameter&lt;T&gt;</code>, <code>@RouteAlias</code>, <code>@ParentLayout</code>.</p><p class="stat">93 classes.</p>' },
      { name:"Build Tools", c:"fl", desc:"Annotation Scanner, npm, Vite build",
        meta:"93+ classes · server/frontend/",
        detail:'<h3>Build Tools</h3><span class="tag open">Apache 2.0</span><p>The full frontend build toolchain:</p><ol><li><b>Annotation Scanner</b> — Scans classpath: <code>@Route</code>, <code>@NpmPackage</code>, <code>@JsModule</code>, <code>@CssImport</code>, <code>@Theme</code>, <code>@Uses</code></li><li><b>Node/npm Installer</b> — Downloads Node.js if missing, runs <code>npm install</code></li><li><b>Import Generator</b> — Generates <code>vaadin.ts</code> with imports for all web components</li><li><b>Vite Build</b> — <code>TaskPrepareProdBundle</code> runs <code>vite build</code> → optimized bundle</li><li><b>Theme Compiler</b> — <code>CssBundler</code> extracts CSS from Lumo/Aura</li></ol><p class="stat">93+ classes in server/frontend/ + flow-plugins/ (Maven + Gradle plugins).</p>' },
      { name:"Dev Server", c:"fl", desc:"Vite dev server, HMR proxy",
        meta:"~15 classes · vaadin-dev-server/",
        detail:'<h3>Dev Server</h3><span class="tag open">Apache 2.0</span><p>Development mode only (not in production):</p><ul><li><code>ViteHandler</code> — Launches Vite process (<code>node vite --port 5173</code>)</li><li><code>ViteWebsocketProxy</code> — Proxies WebSocket HMR (Hot Module Replace)</li><li><code>DevBundleBuildingHandler</code> — On-the-fly rebuild when imports change</li><li><code>DevToolsInterface</code> — IDE ↔ server communication</li><li><code>BrowserLiveReload</code> — Automatic browser reload</li></ul><p>Flow: <code>GET /VAADIN/@vite/client</code> → proxy → Vite :5173</p>' },
      { name:"Hilla", c:"fl", desc:"React typesafe offline-capable views",
        meta:"v25.1.0-alpha8 · Apache 2.0",
        detail:'<h3>Hilla</h3><span class="tag open">Apache 2.0</span><p>Alternative framework within the Flow ecosystem. React views with typed endpoints:</p><ul><li><code>@BrowserCallable</code> — Marks Java services accessible from React. Auto-generates TypeScript types and typed clients.</li><li><b>Offline-capable</b> — React views can work without server (PWA + service worker)</li><li><b>No UIDL</b> — Views are 100% client, server exposes typed REST endpoints</li><li><b>Auto TypeScript Gen</b> — TS interfaces for entities + form models for client-side validation</li></ul><p><b>Hilla vs Flow:</b> Flow keeps state on server (thin client, UIDL). Hilla keeps state on client (thick client, REST). Both share the same web components.</p>' },
    ]
  },

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════

let openIndices = []; // top-level sections currently open (order = click order, last = active)
let subPath = [];      // drill-down within the active section's children
let essentials = false; // essentials mode highlights core items
let mvpMode = false;    // MVP mode shows only Frontend + Framework with RPC/UIDL pipe
let pythonMode = false; // Python mode: collapses Browser essentials into "Production Bundle"
const PYTHON_NAMES = {
  "Request Handlers": "http_server.py",
  "ServerRpcHandler": "uidl_handler.py",
  "StateTree": "state_tree.py + state_node.py",
  "Element API": "element.py",
  "Component Model": "component.py + mixins.py",
  "Flow Components": "components/*.py (49 files)",
  "Data Binding": "data/*.py (5 files)",
  "Router": "app.py"
};
let hashMode = '';      // URL hash mode: 'initial', 'essentials', 'mvp', or '' (no hash)

// Which items are essential (by section index → child name substrings)
const ESSENTIAL = {
  0: ["Web Components Core", "FlowClient", "Lumo"],  // Frontend
  1: ["Request Handlers", "ServerRpcHandler", "StateTree", "Element API", "Component Model", "Flow Components", "Data Binding", "Router"],  // Java Framework
};
function isEssential(sectionIdx, childName) {
  const list = ESSENTIAL[sectionIdx];
  if (!list) return false;
  return list.some(e => childName.includes(e));
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════

let firstRender = true;

function render() {
  const update = () => {
    const app = document.getElementById('app');
    let html = '';

    // Header (hidden — titles removed for embed use)
    html += '<div class="mode-btns">';
    var hideEss = (hashMode === 'essentials');
    var hideMvp = (hashMode === 'initial');
    if (!hideEss) html += `<button class="ess-btn${essentials?' active':''}" onclick="toggleEssentials()"><span class="ess-icon">💡</span>Essentials</button>`;
    if (!hideMvp && !mvpMode) html += `<button class="mvp-btn" onclick="toggleMvp()"><span class="mvp-icon">🚀</span>MVP</button>`;
    if (mvpMode || pythonMode) html += `<button class="py-btn${pythonMode?' active':''}" onclick="togglePython()"><span class="py-icon">🐍</span>Python</button>`;
    html += '</div>';

    if (mvpMode) {
      // ── MVP MODE: Browser (left) | pipe | Server (right) ──
      // Uses same col-child divs with view-transition-name so they animate from split mode
      const fe = DATA[0], fl = DATA[1];

      html += '<div class="mvp-layout">';

      // Browser box (left)
      html += '<div class="mvp-box c-fe" style="view-transition-name:sec-0">';
      html += '<div class="mvp-box-title"><span class="mvp-icon">🌐</span> Browser <span class="mvp-sub">Client</span></div>';
      html += '<div class="mvp-items">';
      if (pythonMode) {
        html += '<div class="mvp-item col-child c-fe2 is-ess" style="view-transition-name:ess-0-bundle">Production Bundle<br><small>from mvn artefacts</small></div>';
      } else {
        (fe.children || []).forEach((child, ci) => {
          if (!isEssential(0, child.name)) return;
          html += `<div class="mvp-item col-child c-${child.c}2 is-ess" style="view-transition-name:ess-0-${ci}" onclick="mvpSelect(0,${ci})">${child.name}</div>`;
        });
      }
      html += '</div></div>';

      // Horizontal animated pipe
      html += '<div class="mvp-pipe">';
      html += '<div class="mvp-pipe-label">RPC / UIDL</div>';
      html += '<div class="mvp-pipe-line"></div>';
      html += '</div>';

      // Server box (right)
      html += '<div class="mvp-box c-fl" style="view-transition-name:sec-1">';
      html += `<div class="mvp-box-title"><span class="mvp-icon">${pythonMode?'🐍':'⚡'}</span> ${pythonMode?'Python':'Server'} <span class="mvp-sub">${pythonMode?'PyFlow':'State'}</span></div>`;
      html += '<div class="mvp-items">';
      (fl.children || []).forEach((child, ci) => {
        if (!isEssential(1, child.name)) return;
        const label = pythonMode ? (Object.entries(PYTHON_NAMES).find(([k]) => child.name.includes(k)) || [,''])[1] || child.name : child.name;
        html += `<div class="mvp-item col-child c-${child.c}2 is-ess" style="view-transition-name:ess-1-${ci}"${pythonMode?'':` onclick="mvpSelect(1,${ci})"`}>${label}</div>`;
      });
      html += '</div></div>';

      html += '</div>';

      // Detail dialog overlay if a child is selected
      if (subPath.length > 0) {
        const secIdx = subPath[0];
        const childIdx = subPath[1];
        const section = DATA[secIdx];
        const selectedChild = (section.children || [])[childIdx];
        if (selectedChild) {
          const headerLicense = getHeaderLicense(selectedChild);
          html += '<div class="detail-overlay" onclick="closeDetailOverlay(event)">';
          html += '<div class="detail-dialog" onclick="event.stopPropagation()">';
          html += `<div class="detail-dialog-header c-${section.c}">`;
          html += `<span style="font-size:1.1rem">${section.icon || ''}</span>`;
          html += `<span class="sh-name">${section.name} › ${selectedChild.name}</span>`;
          if (headerLicense) html += `<span class="license-badge ${headerLicense.cls}">${headerLicense.label}</span>`;
          html += `<button class="detail-close" onclick="closeDetail()">✕</button>`;
          html += '</div>';
          html += '<div class="detail-dialog-body">';
          html += renderDialogContent(selectedChild, !!headerLicense);
          html += '</div></div></div>';
        }
      }
    } else if (openIndices.length === 0) {
      // ── HOME: all top-level blocks ──
      html += '<div class="grid home-grid">';
      DATA.forEach((item, i) => {
        html += `<div class="block c-${item.c}" style="view-transition-name:sec-${i}" onclick="toggleSection(${i})">`;
        if (item.icon) html += `<div class="bicon">${item.icon}</div>`;
        html += `<div class="bname">${item.name}</div>`;
        if (item.desc) html += `<div class="bdesc">${item.desc}</div>`;
        if (item.meta) html += `<div class="bmeta">${item.meta}</div>`;
        html += '</div>';
      });
      html += '</div>';
    } else {
      // ── SPLIT MODE: open cols (left) + remaining big blocks (right) ──
      const activeIdx = openIndices[openIndices.length - 1];
      const sortedOpen = [...openIndices].sort((a, b) => a - b);
      const closed = DATA.map((_, i) => i).filter(i => !openIndices.includes(i));

      html += '<div class="split">';

      // Left: open sections as compact columns — flex proportional to count
      html += `<div class="open-cols" style="flex:${sortedOpen.length}">`;
      sortedOpen.forEach(si => {
        const section = DATA[si];
        const isActive = si === activeIdx;
        html += `<div class="open-col" style="view-transition-name:sec-${si}">`;
        const noEss = ESSENTIAL[si] ? '' : ' no-ess';
        html += `<div class="col-header c-${section.c}${noEss}" onclick="toggleSection(${si})">`;
        if (section.icon) html += `<span class="ch-icon">${section.icon}</span>`;
        html += section.name;
        html += '</div>';
        html += '<div class="col-down">│<br>▼</div>';
        html += '<div class="col-children">';
        (section.children || []).forEach((child, ci) => {
          const sel = isActive && subPath[0] === ci ? ' selected' : '';
          const isE = isEssential(si, child.name);
          const ess = isE ? ' is-ess' : '';
          const vtn = isE ? ` style="view-transition-name:ess-${si}-${ci}"` : '';
          html += `<div class="col-child c-${child.c}2${sel}${ess}"${vtn} onclick="openAndSelect(${si},${ci})">${child.name}</div>`;
        });
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';

      // Right: remaining big blocks
      if (closed.length > 0) {
        html += `<div class="remaining" style="flex:${closed.length}"><div class="grid">`;
        closed.forEach(ci => {
          const item = DATA[ci];
          html += `<div class="block c-${item.c}" style="view-transition-name:sec-${ci}" onclick="toggleSection(${ci})">`;
          if (item.icon) html += `<div class="bicon">${item.icon}</div>`;
          html += `<div class="bname">${item.name}</div>`;
          if (item.desc) html += `<div class="bdesc">${item.desc}</div>`;
          if (item.meta) html += `<div class="bmeta">${item.meta}</div>`;
          html += '</div>';
        });
        html += '</div></div>';
      }

      html += '</div>';

      // Detail dialog overlay for the active section's selected child
      if (subPath.length > 0 && activeIdx !== undefined) {
        const section = DATA[activeIdx];
        const children = section.children || [];
        const selectedChild = children[subPath[0]];

        if (selectedChild) {
          const headerLicense = getHeaderLicense(selectedChild);
          html += '<div class="detail-overlay" onclick="closeDetailOverlay(event)">';
          html += '<div class="detail-dialog" onclick="event.stopPropagation()">';
          html += `<div class="detail-dialog-header c-${section.c}">`;
          html += `<span style="font-size:1.1rem">${section.icon || ''}</span>`;
          html += `<span class="sh-name">${section.name} › ${selectedChild.name}</span>`;
          if (headerLicense) html += `<span class="license-badge ${headerLicense.cls}">${headerLicense.label}</span>`;
          html += `<button class="detail-close" onclick="closeDetail()">✕</button>`;
          html += '</div>';
          html += '<div class="detail-dialog-body">';
          html += renderDialogContent(selectedChild, !!headerLicense);
          html += '</div></div></div>';
        }
      }
    }

    app.innerHTML = html;
    app.classList.toggle('split-mode', openIndices.length > 0 && !mvpMode);

    // Re-apply essentials mode after render (no FLIP — elements are new)
    if (essentials) requestAnimationFrame(() => {
      app.classList.add('ess-mode');
      const btn = app.querySelector('.ess-btn');
      if (btn) btn.classList.add('active');
    });
  };

  if (firstRender || subPath.length > 0 || !document.startViewTransition) {
    firstRender = false;
    update();
  } else {
    document.startViewTransition(update);
  }
}

// Detect license from detail HTML or meta string
function detectLicense(item) {
  const d = (item.detail || '') + ' ' + (item.meta || '');
  if (/Apache\s*2\.0/i.test(d)) return { cls:'open', label:'Apache 2.0' };
  if (/Commercial/i.test(d)) return { cls:'com', label:'Commercial' };
  if (/Free/i.test(d)) return { cls:'open', label:'Free' };
  return null;
}

// Strip <h3>...</h3> and leading <span class="tag ...">...</span> from detail HTML (already shown in header)
function stripDetailTitle(html) {
  return html.replace(/^\s*<h3>.*?<\/h3>\s*/i, '').replace(/^\s*<span class="tag[^"]*">.*?<\/span>\s*/i, '');
}

// Get the license for the dialog header.
// If item has no children → its own license. If all children share the same → that unified license.
function getHeaderLicense(item) {
  if (!item.children || item.children.length === 0) return detectLicense(item);
  const licenses = item.children.map(c => detectLicense(c)).filter(Boolean);
  if (licenses.length === item.children.length && licenses.every(l => l.label === licenses[0].label)) {
    return licenses[0]; // all same → show in header
  }
  return detectLicense(item); // fallback to parent's own license
}

// Render dialog body: flat list for children, or detail HTML for leaves
// hideChildLicenses = true when all children share the same license (shown in header)
function renderDialogContent(item, hideChildLicenses) {
  let html = '';
  if (item.children && item.children.length > 0) {
    html += '<div class="dialog-children">';
    item.children.forEach(child => {
      const license = hideChildLicenses ? null : detectLicense(child);
      html += `<div class="dialog-child c-${child.c}2">`;
      html += `<div style="display:flex;align-items:center;gap:.4rem">`;
      html += `<span class="dc-name">${child.name}</span>`;
      if (license) html += `<span class="dc-license license-badge ${license.cls}">${license.label}</span>`;
      html += '</div>';
      const desc = child.desc || extractBrief(child.detail);
      if (desc) html += `<div class="dc-desc">${desc}</div>`;
      html += '</div>';
    });
    html += '</div>';
  } else if (item.detail) {
    html += `<div class="detail">${stripDetailTitle(item.detail)}</div>`;
  }
  return html;
}

// Extract a brief description from detail HTML (first <p> or first few <li> items)
function extractBrief(detailHtml) {
  if (!detailHtml) return '';
  // Try first non-stat <p>
  const ps = detailHtml.match(/<p(?!\s+class="stat")[^>]*>([\s\S]*?)<\/p>/gi);
  if (ps) {
    for (const p of ps) {
      const m = p.match(/<p[^>]*>([\s\S]*?)<\/p>/i);
      if (m) { const t = m[1].replace(/<[^>]+>/g, '').trim(); if (t.length > 10) return t.substring(0, 180); }
    }
  }
  // Fallback: join first 3 <li> items
  const lis = [...detailHtml.matchAll(/<li>([\s\S]*?)<\/li>/gi)].slice(0, 3);
  if (lis.length) return lis.map(m => m[1].replace(/<[^>]+>/g, '').trim()).join(' · ').substring(0, 180);
  return '';
}

// Close detail dialog with animation
function closeDetail() {
  const overlay = document.querySelector('.detail-overlay');
  if (!overlay) return;
  overlay.classList.add('closing');
  overlay.addEventListener('animationend', () => {
    subPath = [];
    render();
  }, { once: true });
}

function closeDetailOverlay(e) {
  if (e.target === e.currentTarget) closeDetail();
}

// ═══════════════════════════════════════════════════════════════════
// HANDLERS
// ═══════════════════════════════════════════════════════════════════

function toggleMvp() {
  if (!mvpMode) {
    // ── ENTER MVP: FLIP essential items + fade out the rest ──
    const app = document.getElementById('app');

    // Update buttons immediately
    const mb = app.querySelector('.mvp-btn'); if (mb) mb.classList.add('active');
    const eb = app.querySelector('.ess-btn'); if (eb) eb.classList.remove('active');

    // FIRST — record positions of essential items (keyed by view-transition-name)
    const firstRects = {};
    app.querySelectorAll('.col-child.is-ess').forEach(el => {
      const vtn = el.style.viewTransitionName;
      if (vtn) firstRects[vtn] = el.getBoundingClientRect();
    });
    const hasFlipSources = Object.keys(firstRects).length > 0;

    // Phase 1 — Fade out elements that will DISAPPEAR
    if (hasFlipSources) {
      // Split mode: fade non-essential items, headers, arrows, remaining blocks
      app.querySelectorAll('.col-child:not(.is-ess)').forEach((el, i) => {
        el.style.transition = `opacity 0.6s ease ${i * 0.02}s, transform 0.6s ease`;
        el.style.opacity = '0';
        el.style.transform = 'scale(0.75)';
      });
      app.querySelectorAll('.col-header, .col-down').forEach(el => {
        el.style.transition = 'opacity 0.5s ease';
        el.style.opacity = '0';
      });
      app.querySelectorAll('.remaining .block').forEach((el, i) => {
        el.style.transition = `opacity 0.6s ease ${i * 0.04}s, transform 0.6s ease`;
        el.style.opacity = '0';
        el.style.transform = 'scale(0.85)';
      });
    } else {
      // Home mode: fade all blocks
      app.querySelectorAll('.block').forEach((el, i) => {
        el.style.transition = `opacity 0.7s ease ${i * 0.05}s, transform 0.7s ease`;
        el.style.opacity = '0';
        el.style.transform = 'scale(0.9)';
      });
    }

    // Phase 2 — After fade, render MVP + FLIP items into place
    setTimeout(() => {
      mvpMode = true;
      essentials = false;
      openIndices = [];
      subPath = [];
      firstRender = true; // skip View Transitions (we animate manually)
      render();

      // FLIP — essential items fly to their MVP positions
      if (hasFlipSources) {
        app.querySelectorAll('.mvp-item').forEach(el => {
          const vtn = el.style.viewTransitionName;
          const first = firstRects[vtn];
          if (!first) {
            // No source position → simple fade in
            el.style.opacity = '0';
            el.style.transform = 'translateY(10px)';
            requestAnimationFrame(() => {
              el.style.transition = 'opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s';
              el.style.opacity = '1';
              el.style.transform = '';
            });
            return;
          }
          const last = el.getBoundingClientRect();
          const dx = first.left - last.left;
          const dy = first.top - last.top;

          // Invert: place item at its old position
          el.style.transform = `translate(${dx}px, ${dy}px)`;
          el.style.transition = 'none';

          // Play: animate to final position
          requestAnimationFrame(() => { requestAnimationFrame(() => {
            el.style.transition = 'transform 1s cubic-bezier(0.22, 1, 0.36, 1)';
            el.style.transform = '';
            el.addEventListener('transitionend', function h(e) {
              if (e.propertyName === 'transform') {
                el.style.transition = '';
                el.removeEventListener('transitionend', h);
              }
            });
          }); });
        });

        // MVP boxes: background fades in around the items
        document.querySelectorAll('.mvp-box').forEach(box => {
          box.style.background = 'transparent';
          box.style.borderColor = 'transparent';
          box.style.boxShadow = 'none';
          requestAnimationFrame(() => {
            box.style.transition = 'background 0.8s ease 0.2s, border-color 0.8s ease 0.2s, box-shadow 0.8s ease 0.2s';
            box.style.background = '';
            box.style.borderColor = '';
            box.style.boxShadow = '';
            box.addEventListener('transitionend', function h() {
              box.style.transition = '';
              box.removeEventListener('transitionend', h);
            });
          });
        });

        // MVP titles fade in
        document.querySelectorAll('.mvp-box-title').forEach(el => {
          el.style.opacity = '0';
          requestAnimationFrame(() => {
            el.style.transition = 'opacity 0.7s ease 0.4s';
            el.style.opacity = '1';
            el.addEventListener('transitionend', function h() {
              el.style.transition = '';
              el.removeEventListener('transitionend', h);
            });
          });
        });

      } else {
        // No FLIP sources (home mode) → boxes slide in
        document.querySelectorAll('.mvp-box').forEach((box, i) => {
          box.style.opacity = '0';
          box.style.transform = i === 0 ? 'translateX(-50px)' : 'translateX(50px)';
          requestAnimationFrame(() => {
            box.style.transition = 'opacity 0.8s ease, transform 0.8s cubic-bezier(0.22, 1, 0.36, 1)';
            box.style.opacity = '1';
            box.style.transform = '';
          });
        });
        document.querySelectorAll('.mvp-item').forEach((el, i) => {
          el.style.opacity = '0';
          el.style.transform = 'translateY(12px)';
          requestAnimationFrame(() => {
            el.style.transition = `opacity 0.5s ease ${0.15 + i * 0.06}s, transform 0.5s ease ${0.15 + i * 0.06}s`;
            el.style.opacity = '1';
            el.style.transform = '';
          });
        });
      }

      // Pipe always scales in last
      const pipe = document.querySelector('.mvp-pipe');
      if (pipe) {
        pipe.style.opacity = '0';
        pipe.style.transform = 'scaleX(0)';
        requestAnimationFrame(() => {
          pipe.style.transition = 'opacity 0.6s ease 0.5s, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s';
          pipe.style.opacity = '1';
          pipe.style.transform = '';
        });
      }
    }, 750);

  } else {
    // ── LEAVE MVP ──
    mvpMode = false;
    pythonMode = false;
    openIndices = [];
    subPath = [];
    render();
  }
}

function mvpSelect(sectionIdx, childIdx) {
  if (subPath.length === 2 && subPath[0] === sectionIdx && subPath[1] === childIdx) {
    subPath = []; // toggle off
  } else {
    subPath = [sectionIdx, childIdx];
  }
  render();
}

function togglePython() {
  pythonMode = !pythonMode;
  if (pythonMode && !mvpMode) { mvpMode = true; }
  subPath = [];
  render();
}

function toggleEssentials() {
  essentials = !essentials;
  mvpMode = false;
  pythonMode = false;
  const app = document.getElementById('app');

  if (essentials && (!openIndices.includes(0) || !openIndices.includes(1))) {
    // Need to open Frontend + Java Framework → must re-render
    if (!openIndices.includes(0)) openIndices.push(0);
    if (!openIndices.includes(1)) openIndices.push(1);
    subPath = [];
    render();
    // Apply ess-mode after render, in next frame so transitions work
    requestAnimationFrame(() => applyEssMode(true));
  } else {
    // Already open or turning off → just toggle CSS, no re-render
    applyEssMode(essentials);
  }
}

function applyEssMode(on) {
  const app = document.getElementById('app');
  const children = [...document.querySelectorAll('.col-child')];

  // FIRST — record current positions
  const firstRects = new Map();
  children.forEach(el => firstRects.set(el, el.getBoundingClientRect()));

  // APPLY — toggle ess-mode (triggers CSS order:-1 for .is-ess)
  app.classList.toggle('ess-mode', on);

  // LAST + INVERT + PLAY (FLIP)
  children.forEach(el => {
    const first = firstRects.get(el);
    if (!first) return;
    const last = el.getBoundingClientRect();
    const dy = first.top - last.top;
    if (Math.abs(dy) < 2) return;

    el.style.transform = `translateY(${dy}px)`;
    el.style.transition = 'none';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.style.transition = 'transform 1s cubic-bezier(0.25, 0.1, 0.25, 1), padding .35s, font-size .35s, opacity .35s, filter .35s, box-shadow .35s, color .35s';
        el.style.transform = '';
        el.addEventListener('transitionend', function h(e) {
          if (e.propertyName === 'transform') {
            el.style.transition = '';
            el.removeEventListener('transitionend', h);
          }
        });
      });
    });
  });

  // Update button state
  const btn = app.querySelector('.ess-btn');
  if (btn) btn.classList.toggle('active', on);
}

function toggleSection(index) {
  mvpMode = false;
  const pos = openIndices.indexOf(index);
  if (pos !== -1) {
    if (openIndices.length === 1) {
      openIndices = []; // go home
    } else if (openIndices[openIndices.length - 1] === index) {
      openIndices.splice(pos, 1); // close active
    } else {
      // Non-active open one clicked: make it active
      openIndices.splice(pos, 1);
      openIndices.push(index);
    }
  } else {
    openIndices.push(index);
  }
  subPath = [];
  render();
}

function makeActive(sectionIndex) {
  const pos = openIndices.indexOf(sectionIndex);
  if (pos !== -1) {
    openIndices.splice(pos, 1);
    openIndices.push(sectionIndex);
  }
  subPath = [];
  render();
}

function openAndSelect(sectionIndex, childIndex) {
  // Make this section active and select the child
  const pos = openIndices.indexOf(sectionIndex);
  if (pos !== -1) openIndices.splice(pos, 1);
  openIndices.push(sectionIndex);
  subPath = [childIndex];
  render();
}

function subSelect(depth, index) {
  if (subPath[depth] === index) {
    subPath.length = depth;
  } else {
    subPath[depth] = index;
    subPath.length = depth + 1;
  }
  render();
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

render();

// Hash-based initial state: #initial, #essentials, #mvp
(function() {
  var hash = location.hash.replace('#', '').toLowerCase();
  hashMode = hash;
  if (hash === 'initial') {
    render(); // re-render to hide MVP button
  } else if (hash === 'essentials') {
    toggleEssentials(); // toggleEssentials calls render(), which hides Essentials button
  } else if (hash === 'mvp') {
    toggleMvp();
  }
})();

// Close detail dialog with Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && subPath.length > 0) {
    e.preventDefault();
    closeDetail();
  }
});
</script>
